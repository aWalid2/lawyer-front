name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  precheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project (pre-check)
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: precheck  # only runs if precheck succeeds

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy to VPS with retry
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          script: |
            set -e

            echo "Connecting and deploying..."
            cd /lawyer/lawyer-front
            git pull origin main
            npm install
            npm run build
